apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: vuejs
servers: 1
agents: 3
image: rancher/k3s:v1.31.4-k3s1
ports:
  - port: 18080:80
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: 120s
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
