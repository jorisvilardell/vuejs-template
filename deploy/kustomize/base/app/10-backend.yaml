apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: world
  labels:
    app.kubernetes.io/name: world-backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: world-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: world-backend
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: world-backend
      containers:
        - name: backend
          image: ghcr.io/zuhowks/vuejs-template-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3333 }
          env:
            - { name: NODE_ENV, value: production }
            - { name: HOST, value: 0.0.0.0 }
            - { name: PORT, value: "3333" }
            - { name: LOG_LEVEL, value: info }
            - { name: MODE, value: queue }
            - name: APP_KEY
              valueFrom: { secretKeyRef: { name: world-secrets, key: APP_KEY } }
            - name: ARTEMIS_USER
              valueFrom: { secretKeyRef: { name: world-secrets, key: ARTEMIS_USER } }
            - name: ARTEMIS_PASSWORD
              valueFrom: { secretKeyRef: { name: world-secrets, key: ARTEMIS_PASSWORD } }
          envFrom:
            - configMapRef: { name: world-config }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 384Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: world
  labels:
    app.kubernetes.io/name: world-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: world-backend
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: world
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend
  namespace: world
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: world-backend
